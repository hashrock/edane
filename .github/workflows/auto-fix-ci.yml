name: Claude Auto-Fix CI

# Triggered when the (manually-run) CI workflow finishes. If CI failed, Claude
# inspects the failing run, makes a minimal fix on a new branch, and opens a PR.
#
# NOTE: workflow_run workflows always run from the version of this file on the
# default branch, so this only takes effect once merged to main. It also
# requires an ANTHROPIC_API_KEY secret in the repository.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write # commit the fix to a new branch
  pull-requests: write # open the fix PR
  actions: read # read the failing run's logs
  id-token: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    # Only act on failures, and never on a branch we created ourselves (no loop).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      !startsWith(github.event.workflow_run.head_branch, 'claude/auto-fix-ci-')
    steps:
      - name: Checkout the failing branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="claude/auto-fix-ci-${{ github.event.workflow_run.id }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Diagnose and fix with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: "actions: read"
          prompt: |
            The CI workflow run below failed. Diagnose the root cause and fix it.

            Repository: ${{ github.repository }}
            Failed run: ${{ github.event.workflow_run.html_url }}
            Run ID:     ${{ github.event.workflow_run.id }}
            Branch:     ${{ github.event.workflow_run.head_branch }}

            Steps:
            1. Read the failing job logs for the run above (use the CI tools).
            2. Identify the root cause in the code.
            3. Make minimal, targeted fixes — do not refactor unrelated code.
            4. Verify locally: `pnpm install --frozen-lockfile`, then
               `pnpm run test` and/or `pnpm run test:e2e` as appropriate.
            5. Commit your changes with a clear message. Do NOT push or open a
               PR yourself — a later workflow step handles that.
          claude_args: "--max-turns 15"

      - name: Open fix PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="origin/${{ github.event.workflow_run.head_branch }}"
          if [ "$(git rev-list --count "$BASE..HEAD")" -eq 0 ]; then
            echo "Claude committed no changes; nothing to open a PR for."
            exit 0
          fi
          git push -u origin "${{ steps.branch.outputs.name }}"
          gh pr create \
            --base "${{ github.event.workflow_run.head_branch }}" \
            --head "${{ steps.branch.outputs.name }}" \
            --title "Auto-fix CI failure (run ${{ github.event.workflow_run.id }})" \
            --body "Automated fix for the failed CI run: ${{ github.event.workflow_run.html_url }}

          Generated by the Claude Auto-Fix CI workflow. Please review before merging."
