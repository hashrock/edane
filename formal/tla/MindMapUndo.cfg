\* TLC configuration for MindMapUndo.
\*
\* This config sets ReconcileAuto = FALSE, modeling TODAY's code where
\* reconcileView() is a SEPARATE step the caller must run after undo/redo.
\* Expected result: INVARIANT ActiveAlwaysLive is VIOLATED, with a short trace
\*   Init -> AddNode (active := n1) -> Undo (doc := {r}, active still n1)
\* i.e. the dangling-selection state.
\*
\* Flip ReconcileAuto to TRUE (fold reconcile into undo/redo) and re-run to see
\* the invariant hold -> that is the proposed fix.

CONSTANTS
    Nodes = {r, n1, n2}
    Root = r
    ReconcileAuto = FALSE
    MaxEdits = 3

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT ActiveAlwaysLive
