<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edane - API Token</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; margin: 0; background: #f9fafb; }
    h2 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 12px; color: #6b7280; margin: 0 0 16px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 6px; }
    .actions { margin-top: 16px; text-align: right; }
    button { padding: 8px 16px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; background: #2563eb; color: white; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h2>API トークンを入力</h2>
  <p>Webアプリの設定画面でトークンを発行してください。</p>
  <input id="token" type="text" placeholder="edane_..." autofocus>
  <div class="actions">
    <button id="save">保存</button>
  </div>
  <script>
    document.getElementById("save").addEventListener("click", () => {
      const token = document.getElementById("token").value;
      if (token) window.electronPrompt.saveToken(token);
    });
    document.getElementById("token").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const token = document.getElementById("token").value;
        if (token) window.electronPrompt.saveToken(token);
      }
    });
  </script>
</body>
</html>
